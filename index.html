<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Tracker Pro Dash v15.2 (Dynamic RPM)</title>
    <style>
        :root {
            --kawasaki-green: #32cd32; --danger-red: #ff3131; --bg-black: #000;
        }
        body { background-color: var(--bg-black); color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .meter-container { 
            position: relative; width: 850px; height: 480px; background: #000; border-radius: 40px; border: 2px solid #111; overflow: hidden; 
        }

        /* Top Icons */
        .top-row { position: absolute; top: 20px; width: 90%; left: 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .signal { font-size: 40px; color: #1a1a1a; transition: 0.2s; }
        .signal-active { color: var(--kawasaki-green); text-shadow: 0 0 20px var(--kawasaki-green); }
        .fan-icon { font-size: 12px; color: #1a1a1a; font-weight: bold; }
        .fan-active { color: #00f3ff; text-shadow: 0 0 15px #00f3ff; }

        /* Dynamic RPM Segments */
        .rpm-area { position: absolute; top: 60px; left: 30px; width: 750px; height: 250px; z-index: 5; }
        .rpm-seg { fill: none; stroke: #151515; stroke-linecap: butt; transition: stroke 0.1s, filter 0.1s; }

        /* Speedo & Gear */
        .speed-ui { position: absolute; top: 140px; left: 35%; transform: translateX(-50%); text-align: center; z-index: 10; }
        .speed-val { font-size: 180px; font-weight: 900; line-height: 0.8; letter-spacing: -8px; }
        .speed-unit { font-size: 22px; color: #444; margin-top: 5px; display: block; }

        .gear-ui { 
            position: absolute; bottom: 100px; right: 80px; font-size: 80px; color: var(--kawasaki-green); font-weight: 900; 
            border: 3px solid var(--kawasaki-green); padding: 5px 30px; border-radius: 20px; text-shadow: 0 0 25px var(--kawasaki-green);
        }

        /* Bottom Data */
        .bottom-line { 
            position: absolute; bottom: 30px; width: 85%; left: 7.5%; display: flex; justify-content: space-between; border-top: 1px solid #111; padding-top: 20px;
        }
        .stat-val { font-size: 26px; font-weight: bold; color: var(--kawasaki-green); display: block; }
        .stat-lbl { font-size: 10px; color: #444; text-transform: uppercase; }

        .trip-area { position: absolute; top: 20px; right: 30px; text-align: right; }
        .trip-val { font-size: 22px; color: white; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="meter-container">
    <div class="top-row">
        <div id="l-sig" class="signal">⇦</div>
        <div id="fan" class="fan-icon">FAN ON</div>
        <div id="r-sig" class="signal">⇨</div>
    </div>

    <div class="trip-area">
        <div class="trip-val"><span id="trip">0.0</span> <small style="font-size:12px; color:#444;">TRIP km</small></div>
    </div>

    <div class="rpm-area">
        <svg id="rpm-svg" viewBox="0 0 800 300"></svg>
    </div>

    <div class="speed-ui">
        <div id="speed" class="speed-val">0</div>
        <span class="speed-unit">km/h</span>
    </div>

    <div id="gear" class="gear-ui">N</div>

    <div class="bottom-line">
        <div style="text-align:center;"><span id="temp" class="stat-val">0.0°C</span><span class="stat-lbl">Coolant</span></div>
        <div style="text-align:center;"><span id="volt" class="stat-val">0.0V</span><span class="stat-lbl">Battery</span></div>
        <div style="text-align:center;"><span id="odo" class="stat-val">00000.0</span><span class="stat-lbl">ODO</span></div>
    </div>
</div>

<script>
    const svg = document.getElementById('rpm-svg');
    const totalSegments = 50;

    // RPM Segments ටික Generate කරනවා (මුල පොඩියි, අග ලොකුයි)
    for (let i = 0; i < totalSegments; i++) {
        let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        let startX = 50 + (i * 14);
        let startY = 220 - (Math.pow(i, 1.6) * 0.4); // Curve එකක් ගන්න math එක
        
        path.setAttribute("d", `M ${startX} ${startY} L ${startX + 8} ${startY - 15}`);
        path.setAttribute("class", "rpm-seg");
        // RPM වැඩි වෙද්දී Segment එකේ මහත (stroke-width) වැඩි කරනවා
        path.setAttribute("stroke-width", 4 + (i * 0.4)); 
        path.setAttribute("id", "seg-" + i);
        svg.appendChild(path);
    }
