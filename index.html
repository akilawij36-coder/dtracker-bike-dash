<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>S1000RR K67 Official Dash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen { width: 850px; height: 480px; position: relative; background: #000; border: 2px solid #111; border-radius: 10px; }

        #connect-btn { position: absolute; top: 10px; left: 10px; z-index: 100; background: #0066ff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Top Info Bar */
        .top-status { position: absolute; top: 15px; width: 94%; left: 3%; display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .mode { color: #00f3ff; }

        /* Center RPM Gauge - S1000RR Style */
        .rpm-gauge { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); width: 500px; height: 300px; }
        .rpm-circle { fill: none; stroke: #222; stroke-width: 25; stroke-dasharray: 628; stroke-dashoffset: 0; stroke-linecap: butt; }
        .rpm-active { fill: none; stroke: url(#grad); stroke-width: 25; stroke-dasharray: 628; stroke-dashoffset: 628; transition: 0.1s linear; stroke-linecap: butt; }
        
        .rpm-number { position: absolute; top: 210px; left: 50%; transform: translateX(-50%); text-align: center; }
        .rpm-val { font-size: 30px; font-weight: 900; }
        .rpm-label { font-size: 10px; color: #666; letter-spacing: 2px; }

        /* Speed & Gear */
        .speed-unit { position: absolute; top: 80px; left: 330px; text-align: right; }
        .speed-val { font-size: 85px; font-weight: 900; display: block; line-height: 1; }
        .gear-val { position: absolute; top: 80px; right: 330px; font-size: 85px; font-weight: 900; color: #fff; }

        /* Side Widgets (DTC & Brake Style) */
        .widget { position: absolute; top: 180px; width: 120px; height: 180px; border: 1px solid #222; background: rgba(10,10,10,0.8); border-radius: 5px; }
        .widget-l { left: 40px; }
        .widget-r { right: 40px; }
        .widget-head { background: #111; font-size: 12px; padding: 5px; text-align: center; font-weight: bold; color: #888; border-bottom: 1px solid #222; }
        
        /* Bottom Bar */
        .bottom-bar { position: absolute; bottom: 15px; width: 94%; left: 3%; display: flex; justify-content: space-between; font-size: 16px; color: #aaa; border-top: 1px solid #333; padding-top: 10px; }

        /* Warnings */
        .stand-warn { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #ffcc00; font-weight: bold; font-size: 14px; visibility: hidden; }
    </style>
</head>
<body>

<button id="connect-btn">CONNECT S1000RR</button>

<div class="screen">
    <div class="top-status">
        <div id="clock">04:46 PM</div>
        <div class="mode">ROAD</div>
        <div id="odo-top">2513 KM</div>
    </div>

    <div id="stand" class="stand-warn">⚠ SIDE STAND DOWN</div>

    <div class="speed-unit">
        <span class="speed-val" id="speed">0</span>
        <span style="color:#666; font-size:12px;">km/h</span>
    </div>

    <div class="gear-val" id="gear">N</div>

    <div class="widget widget-l">
        <div class="widget-head">VOLT</div>
        <div id="volt-val" style="font-size: 24px; text-align: center; margin-top: 50px; font-weight: bold; color: #00f3ff;">12.6V</div>
    </div>

    <div class="widget widget-r">
        <div class="widget-head">TEMP</div>
        <div id="temp-val" style="font-size: 24px; text-align: center; margin-top: 50px; font-weight: bold; color: #ff3131;">78°C</div>
    </div>

    <div class="rpm-gauge">
        <svg width="500" height="300" viewBox="0 0 500 250">
            <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
                    <stop offset="70%" style="stop-color:#00f3ff;stop-opacity:1" />
                    <stop offset="90%" style="stop-color:#ff3131;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path class="rpm-circle" d="M 100 220 A 150 150 0 1 1 400 220" />
            <path id="rpm-path" class="rpm-active" d="M 100 220 A 150 150 0 1 1 400 220" />
            
            <text x="80" y="235" fill="#444" font-size="12">0</text>
            <text x="250" y="60" fill="#444" font-size="12" text-anchor="middle">7</text>
            <text x="420" y="235" fill="#444" font-size="12">14</text>
        </svg>
        <div class="rpm-number">
            <div class="rpm-val" id="rpm-txt">0</div>
            <div class="rpm-label">RPM x 1000</div>
        </div>
    </div>

    <div class="bottom-bar">
        <div id="trip">TRIP 5.2 KM</div>
        <div style="color: #32cd32;">● READY</div>
        <div id="volt-bottom">12.6 V</div>
    </div>
</div>

<script>
    const connectBtn = document.getElementById('connect-btn');
    let bleChar;

    connectBtn.addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'D-Tracker_Smart_Dash' }],
                optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            bleChar = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            
            await bleChar.startNotifications();
            connectBtn.style.display = 'none';

            bleChar.addEventListener('characteristicvaluechanged', (event) => {
                const value = new TextDecoder().decode(event.target.value);
                const d = value.split(','); // RPM,SPEED,TEMP,VOLT,ODO,NEUT,BEAM,STAND,LEFT,RIGHT

                if(d.length >= 10) {
                    // Speed & Gear
                    document.getElementById('speed').innerText = Math.round(d[1]);
                    document.getElementById('gear').innerText = (d[5] == "1") ? "N" : "D";

                    // RPM Circle Update
                    let rpm = parseInt(d[0]);
                    let rpmK = (rpm / 1000).toFixed(1);
                    document.getElementById('rpm-txt').innerText = rpmK;
                    
                    let dashOffset = 628 - (rpm / 14000) * 628;
                    document.getElementById('rpm-path').style.strokeDashoffset = dashOffset;

                    // Widgets
                    document.getElementById('temp-val').innerText = d[2] + "°C";
                    document.getElementById('volt-val').innerText = d[3] + "V";
                    document.getElementById('volt-bottom').innerText = d[3] + " V";
                    document.getElementById('odo-top').innerText = d[4] + " KM";
                    
                    // Stand Warning
                    document.getElementById('stand').style.visibility = (d[7] == "1") ? "visible" : "hidden";
                }
            });
        } catch (error) { console.log(error); }
    });

    // Time update
    setInterval(() => {
        let now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
</html>
