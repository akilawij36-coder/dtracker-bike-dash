<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>D-Tracker Custom Dash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .dashboard { width: 850px; height: 480px; position: relative; }

        /* Speedometer - Original Clear Style */
        .speed-ui { position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); text-align: center; }
        .speed-val { font-size: 180px; font-weight: 900; color: white; line-height: 0.8; }
        .unit { font-size: 22px; color: #444; }

        /* RPM Arc - Segmented Look */
        .rpm-area { position: absolute; top: 40px; left: 30px; width: 800px; height: 300px; }
        .seg { fill: none; stroke: #151515; stroke-linecap: butt; }

        /* Gear Indicator - Right Bottom Box */
        .gear-ui { 
            position: absolute; bottom: 80px; right: 50px; font-size: 85px; color: #32cd32; font-weight: 900; 
            border: 3px solid #32cd32; padding: 10px 35px; border-radius: 20px; text-shadow: 0 0 20px #32cd32;
        }

        /* Warnings & Stats */
        .top-bar { position: absolute; top: 20px; width: 90%; left: 5%; display: flex; justify-content: space-between; color: #ffcc00; font-size: 16px; }
        .bottom-bar { position: absolute; bottom: 30px; width: 90%; left: 5%; display: flex; justify-content: space-between; color: #32cd32; font-size: 26px; border-top: 1px solid #111; padding-top: 20px; }
        .stat-label { font-size: 10px; color: #444; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="top-bar">
        <div id="stand">⚠ SIDE STAND</div>
        <div id="trip">5.2 <small style="color:#444">TRIP km</small></div>
    </div>

    <div class="rpm-area">
        <svg id="rpm-svg" viewBox="0 0 800 300"></svg>
    </div>

    <div class="speed-ui">
        <div id="speed" class="speed-val">0</div>
        <div class="unit">km/h</div>
    </div>

    <div id="gear" class="gear-ui">N</div>

    <div class="bottom-bar">
        <div style="text-align:center;">78.0°C<span class="stat-label">Coolant</span></div>
        <div style="text-align:center;">12.6V<span class="stat-label">Battery</span></div>
        <div style="text-align:center;">01250<span class="stat-label">ODO Meter</span></div>
    </div>
</div>

<script>
    const svg = document.getElementById('rpm-svg');
    const totalSegs = 50;
    for (let i = 0; i < totalSegs; i++) {
        let p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        let x = 50 + (i * 14.5);
        let y = 240 - (Math.pow(i, 1.5) * 0.4); // Curve එක
        p.setAttribute("d", `M ${x} ${y} L ${x + 10} ${y - 15}`);
        p.setAttribute("class", "seg");
        p.setAttribute("stroke-width", 6 + (i * 0.3)); // පස්සට යද්දී මහත වැඩි වෙනවා
        p.setAttribute("id", "s-" + i);
        svg.appendChild(p);
    }

    function setRPM(val) {
        let active = Math.floor((val / 12000) * totalSegs);
        for (let i = 0; i < totalSegs; i++) {
            let s = document.getElementById("s-" + i);
            if (i < active) {
                s.style.stroke = (i > 42) ? "#ff3131" : "#32cd32";
                s.style.filter = "drop-shadow(0 0 5px currentColor)";
            } else {
                s.style.stroke = "#151515"; s.style.filter = "none";
            }
        }
    }
    setRPM(4500);
</script>
</body>
</html>
