<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<title>D-Tracker Smart Dash Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  body {
    margin: 0;
    background: #000; /* Pure Black for AMOLED */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
  }

  .dashboard {
    width: 90vw;
    height: 50vh;
    background: #000;
    border: 2px solid #1a1a1a;
    border-radius: 30px;
    padding: 25px;
    color: white;
    position: relative;
    box-shadow: 0 0 50px rgba(50, 205, 50, 0.1);
  }

  /* Top Section */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
  }

  .signal {
    color: #32cd32;
    font-size: 35px;
    text-shadow: 0 0 15px #32cd32;
    filter: drop-shadow(0 0 5px #32cd32);
  }

  .warning-area {
    text-align: center;
  }

  .side-stand {
    color: #ffcc00;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .fan-on {
    color: #00f3ff;
    font-size: 12px;
    margin-top: 5px;
    display: none; /* පස්සේ JS එකෙන් ON කරන්න */
    text-shadow: 0 0 10px #00f3ff;
  }

  /* Trip Meter */
  .trip-container {
    position: absolute;
    top: 25px;
    right: 80px;
    text-align: right;
  }
  .trip-val { font-size: 18px; color: #fff; }
  .trip-label { font-size: 9px; color: #666; display: block; }

  /* RPM Curve with SVG */
  .rpm-svg-container {
    position: absolute;
    left: 20px;
    bottom: 80px;
    width: 65%;
  }

  .rpm-path {
    fill: none;
    stroke: #333;
    stroke-width: 8;
    stroke-linecap: round;
  }

  .rpm-fill {
    fill: none;
    stroke: url(#rpmGradient);
    stroke-width: 10;
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000; /* මේක JS එකෙන් වෙනස් කරන්න */
    stroke-linecap: round;
    transition: stroke-dashoffset 0.1s ease;
  }

  /* Speed & Gear */
  .speed-container {
    position: absolute;
    right: 8%;
    top: 35%;
    text-align: center;
  }

  .speed-num {
    font-size: 140px;
    font-weight: 900;
    line-height: 0.8;
  }

  .speed-unit {
    font-size: 20px;
    color: #444;
    display: block;
  }

  .gear-box {
    position: absolute;
    right: 8%;
    bottom: 25%;
    border: 3px solid #32cd32;
    padding: 5px 20px;
    border-radius: 12px;
    font-size: 45px;
    color: #32cd32;
    text-shadow: 0 0 20px #32cd32;
    box-shadow: inset 0 0 15px rgba(50, 205, 50, 0.2);
  }

  /* Bottom Stats */
  .bottom-stats {
    position: absolute;
    bottom: 20px;
    width: 90%;
    left: 5%;
    display: flex;
    justify-content: space-between;
    border-top: 1px solid #1a1a1a;
    padding-top: 15px;
  }

  .stat-block { text-align: center; }
  .stat-val { color: #32cd32; font-size: 22px; font-weight: bold; }
  .stat-label { color: #444; font-size: 10px; display: block; text-transform: uppercase; }

</style>
</head>
<body>

<div class="dashboard">
  <div class="top-bar">
    <div class="signal">⇦</div>
    <div class="warning-area">
      <div class="side-stand">⚠ SIDE STAND</div>
      <div id="fan-indicator" class="fan-on">❄ FAN ON</div>
    </div>
    <div class="signal">⇨</div>
  </div>

  <div class="trip-container">
    <span class="trip-val">0.0 km</span>
    <span class="trip-label">TRIP 1</span>
  </div>

  <div class="rpm-svg-container">
    <svg viewBox="0 0 600 200">
      <defs>
        <linearGradient id="rpmGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="70%" style="stop-color:#32cd32;stop-opacity:1" />
          <stop offset="90%" style="stop-color:#ff0000;stop-opacity:1" />
        </linearGradient>
      </defs>
      <path class="rpm-path" d="M10,180 C100,180 150,150 250,100 C350,50 500,50 580,50" />
      <path id="rpmFill" class="rpm-fill" d="M10,180 C100,180 150,150 250,100 C350,50 500,50 580,50" />
    </svg>
    <div style="color:#444; font-size: 12px; margin-top: -30px; margin-left: 10px;">0 2 4 6 8 10 12 14 16</div>
  </div>

  <div class="speed-container">
    <div class="speed-num">0</div>
    <span class="speed-unit">km/h</span>
  </div>

  <div class="gear-box">N</div>

  <div class="bottom-stats">
    <div class="stat-block">
      <span class="stat-val">0.0°C</span>
      <span class="stat-label">Coolant</span>
    </div>
    <div class="stat-block">
      <span class="stat-val">0.0V</span>
      <span class="stat-label">Battery</span>
    </div>
    <div class="stat-block">
      <span class="stat-val">00000.0</span>
      <span class="stat-label">Odometer</span>
    </div>
  </div>
</div>

<script>
  // Fan On display logic (උදාහරණයක් විදිහට)
  function checkTemp(t) {
    const fan = document.getElementById('fan-indicator');
    if(t >= 75) fan.style.display = 'block';
    else fan.style.display = 'none';
  }

  // RPM Fill control (මේක ESP32 එකෙන් එන ඩේටා වලට ලින්ක් කරන්න)
  function setRPM(val) {
    const path = document.getElementById('rpmFill');
    const maxVal = 16000;
    const offset = 1000 - (val / maxVal) * 1000;
    path.style.strokeDashoffset = offset;
  }
</script>

</body>
</html>
