<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Tracker Smart Dash v3.0</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --danger-red: #ff3131;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .dashboard {
            width: 90vw;
            max-width: 800px;
            background: linear-gradient(145deg, #111, #000);
            border: 2px solid #222;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 15px;
            border-bottom: 1px solid #222;
        }

        .bt-btn {
            background: #222;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .indicators { display: flex; gap: 25px; font-size: 24px; }
        .ind { opacity: 0.1; transition: 0.3s; }
        .active-g { color: var(--neon-green); opacity: 1; text-shadow: 0 0 10px var(--neon-green); }
        .active-b { color: var(--neon-blue); opacity: 1; text-shadow: 0 0 10px var(--neon-blue); }

        /* Main Stats */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            margin-top: 20px;
        }

        .speed-val { font-size: 110px; font-weight: 900; line-height: 1; text-align: center; }
        .unit { font-size: 18px; color: #555; text-align: center; }

        .stat-box { background: #111; padding: 15px; border-radius: 15px; text-align: center; margin: 5px; }
        .stat-label { font-size: 12px; color: #666; }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--neon-blue); }

        /* RPM Bar */
        .rpm-section { grid-column: 1 / span 3; margin-top: 25px; }
        .rpm-bg { width: 100%; height: 20px; background: #111; border-radius: 10px; overflow: hidden; }
        .rpm-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-green), yellow, red); transition: 0.1s; }
        
        .odo { text-align: center; font-size: 14px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="top-bar">
        <button class="bt-btn" onclick="connectBLE()">CONNECT BIKE</button>
        <div class="indicators">
            <span id="left-ind" class="ind">⬅️</span>
            <span id="neutral-ind" class="ind">N</span>
            <span id="high-ind" class="ind">🔆</span>
            <span id="right-ind" class="ind">➡️</span>
        </div>
    </div>

    <div class="main-content">
        <div class="stat-box">
            <div class="stat-label">TEMP</div>
            <div id="temp" class="stat-val">0.0°C</div>
        </div>
        <div class="speed-section">
            <div id="speed" class="speed-val">0</div>
            <div class="unit">KM/H</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">BATTERY</div>
            <div id="volt" class="stat-val">0.0V</div>
        </div>
    </div>

    <div class="rpm-section">
        <div class="rpm-bg"><div id="rpm-bar" class="rpm-fill"></div></div>
        <div class="odo">ODOMETER: <span id="odo-val">0.0</span> KM</div>
    </div>
</div>

<script>
    let bleCharacteristic;
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'D-Tracker_Smart_Dash' }],
                optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
            
            await bleCharacteristic.startNotifications();
            bleCharacteristic.addEventListener('characteristicvaluechanged', handleData);
            alert("Bike Connected! 🏍️");
        } catch (error) {
            console.log(error);
            alert("Connection Failed!");
        }
    }

    function handleData(event) {
        let value = new TextDecoder().decode(event.target.value);
        let data = value.split(','); 
        // Format: RPM,SPEED,TEMP,VOLT,ODO,NEUT,BEAM,STAND,LEFT,RIGHT

        if(data.length >= 10) {
            document.getElementById('speed').innerText = Math.round(data[1]);
            document.getElementById('temp').innerText = data[2] + "°C";
            document.getElementById('volt').innerText = data[3] + "V";
            document.getElementById('odo-val').innerText = data[4];

            // RPM Bar (Max 12000 kiyala hithala)
            let rpmWidth = (data[0] / 12000) * 100;
            document.getElementById('rpm-bar').style.width = rpmWidth + "%";

            // Indicators
            toggleInd('neutral-ind', data[5] == "1", 'active-g');
            toggleInd('high-ind', data[6] == "1", 'active-b');
            toggleInd('left-ind', data[8] == "1", 'active-g');
            toggleInd('right-ind', data[9] == "1", 'active-g');
        }
    }

    function toggleInd(id, active, cls) {
        let el = document.getElementById(id);
        if(active) el.classList.add(cls); else el.classList.remove(cls);
    }
</script>

</body>
</html>
