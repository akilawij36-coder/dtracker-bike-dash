<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSO Style D-Tracker Dash v7.0</title>
    <style>
        :root {
            --neon-blue: #00f3ff; --neon-green: #39ff14; --danger-red: #ff3131; --orange: #ff8c00; --bg-black: #050505;
        }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .meter-container { position: relative; width: 650px; height: 380px; background: #000; border-radius: 60px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,0,0,1); }

        /* RPM Arc */
        .rpm-svg { position: absolute; top: 10px; width: 550px; height: 300px; transform: rotate(-180deg); }
        .rpm-track { fill: none; stroke: #151515; stroke-width: 15; stroke-linecap: round; }
        .rpm-bar { fill: none; stroke: var(--neon-blue); stroke-width: 18; stroke-linecap: round; stroke-dasharray: 630; stroke-dashoffset: 630; transition: 0.1s linear; }

        .center-info { text-align: center; z-index: 10; margin-top: 50px; }
        .speed { font-size: 140px; font-weight: 900; line-height: 0.8; letter-spacing: -5px; }
        .unit { font-size: 18px; color: #444; margin-top: 10px; }

        .gear-box { position: absolute; top: 50px; right: 80px; width: 60px; height: 80px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 55px; font-weight: bold; color: var(--neon-green); }

        .bottom-stats { position: absolute; bottom: 40px; width: 85%; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-top: 15px; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--neon-blue); }
        .stat-lbl { font-size: 10px; color: #444; text-transform: uppercase; display: block; text-align: center; }

        /* BT Button */
        .bt-btn { position: absolute; top: 15px; background: none; border: 1px solid #222; color: #333; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 10px; z-index: 100; }
    </style>
</head>
<body>

<div class="meter-container">
    <button id="bt-status" class="bt-btn" onclick="connectBLE()">TAP TO CONNECT</button>

    <svg class="rpm-svg" viewBox="0 0 400 200">
        <path class="rpm-track" d="M 50 180 A 150 150 0 0 1 350 180" />
        <path id="rpm-arc" class="rpm-bar" d="M 50 180 A 150 150 0 0 1 350 180" />
    </svg>

    <div class="center-info">
        <div id="speed" class="speed">0</div>
        <div class="unit">KM/H</div>
    </div>

    <div id="gear" class="gear-box">N</div>

    <div class="bottom-stats">
        <div><span class="stat-lbl">Temp</span><span id="temp" class="stat-val">0.0°C</span></div>
        <div><span class="stat-lbl">Voltage</span><span id="volt" class="stat-val">0.0V</span></div>
        <div><span class="stat-lbl">Odometer</span><span id="odo" class="stat-val">0.0</span></div>
    </div>
</div>

<script>
    let bleCharacteristic;
    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'D-Tracker_Smart_Dash' }],
                optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            bleCharacteristic = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            await bleCharacteristic.startNotifications();
            bleCharacteristic.addEventListener('characteristicvaluechanged', handleData);
            document.getElementById('bt-status').innerText = "SYSTEM ACTIVE";
            document.getElementById('bt-status').style.color = "var(--neon-green)";
        } catch(e) { console.log(e); }
    }

    function handleData(event) {
        let value = new TextDecoder().decode(event.target.value);
        let data = value.split(','); 
        if(data.length >= 10) {
            let rpm = parseInt(data[0]);
            let temp = parseFloat(data[2]);

            // RPM Arc
            let offset = 630 - (Math.min(rpm, 12000) / 12000) * 630;
            document.getElementById('rpm-arc').style.strokeDashoffset = offset;

            document.getElementById('speed').innerText = Math.round(data[1]);
            document.getElementById('volt').innerText = parseFloat(data[3]).toFixed(1) + "V";
            document.getElementById('odo').innerText = data[4];
            document.getElementById('gear').innerText = (data[5] == "1") ? "N" : "D";

            // Temp Color Logic
            let tEl = document.getElementById('temp');
            tEl.innerText = temp.toFixed(1) + "°C";
            if(temp <= 75) tEl.style.color = "var(--neon-blue)";
            else if(temp <= 105) tEl.style.color = "var(--neon-green)";
            else if(temp <= 115) tEl.style.color = "var(--orange)";
            else tEl.style.color = "var(--danger-red)";
        }
    }
</script>
</body>
</html>
